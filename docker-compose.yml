version: '3.8'

services:
  travel-mcp-server-opensource:
    # 현재 디렉토리의 Dockerfile을 사용하여 이미지를 빌드합니다.
    build: .
    # 컨테이너의 이름을 지정합니다.
    container_name: travel-mcp-server-opensource
    
    # 포트 매핑: Synology NAS의 8000번 포트를 컨테이너의 8000번 포트와 연결합니다.
    # 만약 NAS의 8000번 포트를 다른 서비스가 사용 중이라면, "8088:8000"과 같이 앞쪽 포트를 변경하세요.
    ports:
      - "8000:8000"
      
    # 재시작 정책: NAS가 재부팅되거나 예상치 못한 오류로 컨테이너가 중지될 경우,
    # 자동으로 다시 시작하도록 설정하여 서비스 안정성을 높입니다.
    restart: unless-stopped

