                                <div class="w-full h-80 rounded-xl overflow-hidden">
                                     <!-- IMPORTANT: Replace YOUR_API_KEY with your actual Google Maps API key -->
                                     <iframe src="https://www.google.com/maps/embed/v1/place?key=YOUR_API_KEY&q=${mapQuery}" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                                </div>
                            </div>
                            <div>
                            ${(day.events || []).map(event => `
                                <div class="bg-white rounded-2xl shadow-lg overflow-hidden mb-8">
                                    ${event.image ? `<img src="${event.image}" alt="${event.title}" class="w-full h-56 object-cover">` : ''}
                                    <div class="p-6">
                                        <div class="flex items-baseline gap-4">
                                             <span class="font-bold text-gray-800">${event.time}</span>
                                             <h3 class="font-bold text-xl text-gray-900">${event.title}</h3>
                                        </div>
                                        <p class="text-gray-600 mt-2">${event.description}</p>
                                        ${event.infoId ? `<button onclick="event.stopPropagation(); Router.navigate('info', { tripId: '${trip.id}', infoId: '${event.infoId}' })" class="mt-4 text-accent-color font-semibold text-sm">View Expert Info &rarr;</button>` : ''}
                                    </div>
                                </div>
                            `).join('')}
                            </div>
                        </div>
                    </div>
                `;
                }
            },
            Info: {
                render: (trip, info) => `
                    <div class="p-6">
                        <button onclick="history.back()" class="flex items-center text-sm font-semibold text-gray-600 hover:text-black mb-8 no-print"><i data-lucide="chevron-left" class="w-4 h-4 mr-1"></i>Back</button>
                        <header>
                            <h1 class="text-4xl md:text-5xl font-display font-bold">${info.title}</h1>
                            <p class="text-lg text-gray-500 mt-2">${info.summary}</p>
                        </header>
                        <div class="mt-8 space-y-6">
                            ${info.details.map(detail => `
                                <div class="bg-white p-6 rounded-2xl shadow-lg">
                                    <h2 class="text-xl font-bold font-display">${detail.title}</h2>
                                    <p class="text-gray-700 leading-relaxed mt-2">${detail.content}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>`
            },
            Navbar: {
                render: (tripId) => {
                    const navItems = [
                        { id: 'home', label: 'Library', icon: 'Library', params: {} },
                        { id: 'itinerary', label: 'Itinerary', icon: 'ListChecks', params: { tripId } },
                        { id: 'map', label: 'Map', icon: 'Map', params: { tripId } },
                        { id: 'info', label: 'Info', icon: 'BookOpen', params: { tripId } },
                    ];
                    return `
                        <div class="fixed bottom-0 left-0 right-0 h-24 no-print">
                             <div class="absolute bottom-4 left-1/2 -translate-x-1/2 w-[calc(100%-2rem)] max-w-sm h-16 glassmorphism border rounded-2xl flex items-center justify-around shadow-2xl shadow-gray-300/30">
                                ${navItems.map(item => `
                                    <button onclick="Router.navigate('${item.id}', ${JSON.stringify(item.params)})" class="flex flex-col items-center justify-center w-16 h-16 rounded-xl ${!tripId && item.id !== 'home' ? 'opacity-30 cursor-not-allowed' : 'text-gray-700 hover:text-accent-color'} ${AppState.currentView === item.id || (AppState.currentView === 'dayDetail' && item.id === 'itinerary') ? 'text-accent-color' : ''}" ${!tripId && item.id !== 'home' ? 'disabled' : ''}>
                                        <i data-lucide="${item.icon}"></i>
                                        <span class="text-xs mt-1 font-medium">${item.label}</span>
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                        <button onclick="window.print()" class="no-print fixed bottom-28 right-5 w-14 h-14 bg-accent-color text-white rounded-full shadow-2xl shadow-accent-color/30 flex items-center justify-center hover:bg-opacity-90 focus:outline-none focus:ring-2 focus:ring-accent-color focus:ring-opacity-50 transition-transform hover:scale-105">
                            <i data-lucide="printer"></i>
                        </button>
                    `;
                }
            },
            PrintView: {
                render: (trip) => {
                    let html = `<div id="print-container" class="hidden"><header class="text-center py-8 print-page"><h1 class="text-5xl font-display font-bold">${trip.title}</h1><p class="text-2xl text-gray-500 mt-2">${trip.subtitle}</p><p class="mt-4">${new Date(trip.startDate).toLocaleDateString('en-US', { dateStyle: 'long' })} &bull; ${trip.duration} Days</p></header>`;
                    trip.itinerary.forEach(day => {
                        html += `<section class="print-page"><header><p class="text-sm font-semibold text-accent-color">Day ${day.day} &bull; ${day.date}</p><h2 class="text-3xl font-display font-bold">${day.title}</h2><p class="text-lg text-gray-600">${day.theme}</p></header>`;
                        (day.events || []).forEach(event => {
                            html += `<div class="print-card"><p class="font-bold text-gray-500">${event.time}</p><h3 class="text-xl font-bold mt-1">${event.title}</h3><p class="text-gray-700 mt-2">${event.description}</p></div>`;
                            if(event.infoId && trip.expertInfo && trip.expertInfo[event.infoId]) {
                                const info = trip.expertInfo[event.infoId];
                                html += `<div class="print-card bg-gray-50"><h4 class="text-lg font-bold font-display">${info.title} - Expert Info</h4><p class="mt-2 text-sm text-gray-600">${info.summary}</p>${(info.details || []).map(d => `<div class="mt-4"><h5 class="font-bold text-base">${d.title}</h5><p class="text-sm text-gray-700">${d.content}</p></div>`).join('')}</div>`;
                            }
                        });
                        html += `</section>`;
                    });
                    html += `</div>`;
                    return html;
                }
            }
        };

        const Router = {
            navigate: (view, params = {}) => {
                AppState.currentView = view;
                AppState.activeTripId = params.tripId || AppState.activeTripId;
                AppState.activeDay = params.day || null;
                AppState.activeInfoId = params.infoId || null;

                window.scrollTo(0, 0);
                Render.app();
            }
        };

        const Render = {
            app: () => {
                const trip = AppState.activeTripId ? TRAVEL_DATA.trips.find(t => t.id === AppState.activeTripId) : null;
                let viewHtml = '';

                try {
                    switch (AppState.currentView) {
                        case 'dashboard':
                            viewHtml = trip ? Components.Dashboard.render(trip) : Components.Home.render();
                            break;
                        case 'itinerary':
                            viewHtml = trip ? Components.ItineraryGrid.render(trip) : Components.Home.render();
                            break;
                        case 'dayDetail':
                            const day = trip && AppState.activeDay ? trip.itinerary.find(d => d.day === AppState.activeDay) : null;
                            viewHtml = trip && day ? Components.DayDetail.render(trip, day) : (trip ? Components.ItineraryGrid.render(trip) : Components.Home.render());
                            break;
                        case 'info':
                            const info = trip && AppState.activeInfoId ? trip.expertInfo[AppState.activeInfoId] : null;
                            viewHtml = trip && info ? Components.Info.render(trip, info) : Components.Home.render();
                            break;
                        case 'map':
                             viewHtml = `<div class="p-6 text-center"><h1 class="text-3xl font-display font-bold">Global Map</h1><p class="text-gray-500">Map view for ${trip ? trip.title : ''}</p></div>`;
                             break;
                        default:
                            viewHtml = Components.Home.render();
                    }
                } catch (error) {
                    console.error("Render Error:", error);
                    viewHtml = `<div class="p-8 text-center text-red-500"><h2 class="font-bold text-2xl">A Critical Error Occurred</h2><p>Could not render view: ${AppState.currentView}</p><pre class="mt-4 text-left text-sm bg-red-100 p-4 rounded">${error.stack}</pre></div>`;
                }
                
                AppRoot.innerHTML = viewHtml;
                Render.navbar(AppState.activeTripId);

                if (trip && !document.getElementById('print-container')) {
                    document.body.insertAdjacentHTML('beforeend', Components.PrintView.render(trip));
                }
                
                lucide.createIcons();
            },
            navbar: (tripId) => {
                NavContainer.innerHTML = Components.Navbar.render(tripId);
                lucide.createIcons();
            }
        };
        
        // Initial Load
        document.addEventListener('DOMContentLoaded', () => {
            Render.app();
        });

    </script>
</body>
</html>
